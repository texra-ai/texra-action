name: Release

# Explicit triggers only (no commit-message magic): push a vX.Y.Z tag, or run
# the workflow manually with a version. The moving major tag (e.g. v1) is
# force-updated so consumers can pin `texra-ai/texra-action@v1`.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. v1.0.0"
        required: true
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

# Least privilege by default; the release job opts up to contents: write.
permissions:
  contents: read

# Never cancel an in-flight release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    uses: ./.github/workflows/ci.yml

  release:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Resolve version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            version="$INPUT_VERSION"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$version" -m "Release $version"
            git push origin "$version"
          else
            version="$REF_NAME"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "${{ steps.version.outputs.version }}" \
            --generate-notes

      - name: Move major version tag
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          major="${version%%.*}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "$major" -m "Update $major to $version"
          git push origin "$major" --force
